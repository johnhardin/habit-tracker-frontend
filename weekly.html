<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Summary — Habit Tracker</title>
<script src="https://unpkg.com/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; background: #f5f5f0; min-height: 100vh; }

  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e0;
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; color: #1a1a1a; }
  .nav-link { font-size: 13px; color: #888; text-decoration: none; font-weight: 500; transition: color 0.15s; }
  .nav-link:hover { color: #1a1a1a; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-badge { font-size: 13px; color: #888; }
  .btn-logout {
    padding: 6px 12px; border-radius: 8px; border: 1px solid #e0e0da;
    background: transparent; color: #888; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .btn-logout:hover { color: #c0392b; border-color: #f5c6c6; background: #fdf0f0; }

  main { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }

  .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-subtitle { font-size: 13px; color: #888; margin-bottom: 2rem; }

  .section-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; font-weight: 600; }

  .btn {
    padding: 7px 14px; border-radius: 8px; border: 1px solid #e0e0da;
    background: transparent; color: #1a1a1a; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .btn:hover { background: #f0f0ec; }

  /* Week nav */
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1rem 1.25rem; }
  .week-label { font-size: 15px; font-weight: 600; }
  .week-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .week-btns { display: flex; gap: 8px; }

  /* Overall stat */
  .overall-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
  .overall-pct { font-size: 48px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
  .overall-pct.green { color: #16a34a; }
  .overall-pct.orange { color: #d97706; }
  .overall-pct.red { color: #dc2626; }
  .overall-meta { flex: 1; min-width: 160px; }
  .overall-meta p { font-size: 13px; color: #888; margin-top: 4px; }
  .overall-bar-wrap { flex: 2; min-width: 160px; }
  .bar-track { height: 8px; background: #f0f0ec; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .bar-fill.green { background: #16a34a; }
  .bar-fill.orange { background: #d97706; }
  .bar-fill.red { background: #dc2626; }

  /* Habit grid */
  .grid-wrap { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; overflow: hidden; margin-bottom: 2rem; }
  .grid-table { width: 100%; border-collapse: collapse; }
  .grid-table th { padding: 10px 12px; font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; text-align: center; border-bottom: 1px solid #e5e5e0; background: #fafaf8; }
  .grid-table th.habit-col { text-align: left; min-width: 140px; }
  .grid-table td { padding: 14px 12px; border-bottom: 1px solid #f0f0ec; text-align: center; vertical-align: middle; }
  .grid-table td.habit-col { text-align: left; }
  .grid-table tr:last-child td { border-bottom: none; }
  .habit-name-cell { font-size: 14px; font-weight: 600; }
  .habit-rate { font-size: 12px; margin-top: 3px; font-weight: 500; }
  .habit-rate.green { color: #16a34a; }
  .habit-rate.orange { color: #d97706; }
  .habit-rate.red { color: #dc2626; }
  .day-dot {
    width: 30px; height: 30px; border-radius: 50%; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    border: 1.5px solid #e0e0da; background: #fafaf8; color: #bbb;
    user-select: none;
  }
  .day-dot.done { background: #16a34a; border-color: #16a34a; color: #fff; }
  .day-dot.missed { background: #fef2f2; border-color: #fecaca; color: #fca5a5; }
  .day-dot.off-schedule { background: transparent; border-color: transparent; color: #ddd; cursor: default; }
  .day-dot.today-dot { box-shadow: 0 0 0 2px #1a1a1a; }
  .day-dot.future { opacity: 0.35; cursor: default; }
  .day-dot.clickable:hover:not(.done):not(.future):not(.off-schedule) { border-color: #aaa; background: #f0f0ec; color: #888; }
  .day-dot.done.clickable:hover { background: #15803d; border-color: #15803d; }
  .col-today th, .col-today td { background: #fffef5; }
  .day-header-label { font-size: 11px; color: #aaa; display: block; margin-bottom: 2px; }
  .day-header-date { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .day-header-today .day-header-date { text-decoration: underline; text-underline-offset: 3px; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }
  .loading { color: #bbb; font-size: 14px; padding: 2rem 0; text-align: center; }

  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #1a1a1a; color: #fff; padding: 10px 18px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .overall-card { gap: 1rem; }
    .overall-pct { font-size: 36px; }
    .day-dot { width: 26px; height: 26px; font-size: 11px; }
    .grid-table th, .grid-table td { padding: 10px 6px; }
    .habit-name-cell { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-logo">Habit tracker</span>
    <a href="index.html" class="nav-link">← Dashboard</a>
  </div>
  <div class="header-right">
    <span class="user-badge" id="user-email-display"></span>
    <button class="btn-logout" id="btn-logout">Sign out</button>
  </div>
</header>

<main>
  <p class="page-title">Weekly summary</p>
  <p class="page-subtitle" id="weekRangeLabel">This week's habit completion</p>

  <div class="week-nav">
    <div>
      <div class="week-label" id="weekNavLabel">—</div>
      <div class="week-sub" id="weekNavSub">—</div>
    </div>
    <div class="week-btns">
      <button class="btn" onclick="shiftWeek(-1)">← Prev</button>
      <button class="btn" onclick="shiftWeek(0)">This week</button>
      <button class="btn" onclick="shiftWeek(1)">Next →</button>
    </div>
  </div>

  <div id="overallSection"></div>

  <p class="section-label">Habit completion grid</p>
  <div id="gridSection">
    <div class="grid-wrap"><div class="loading">Loading...</div></div>
  </div>
</main>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────
//  CONFIG — replace with your actual values
// ─────────────────────────────────────────────────────────────────
const USER_POOL_ID = 'ap-southeast-1_x5XeePuup';
const CLIENT_ID    = 'lk03hsitkj6ptq3ioeh8i1av4';
const API          = 'https://61y3ffttr2.execute-api.ap-southeast-1.amazonaws.com';

// ─────────────────────────────────────────────────────────────────
//  Cognito setup
// ─────────────────────────────────────────────────────────────────
const poolData = { UserPoolId: USER_POOL_ID, ClientId: CLIENT_ID };
const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

let currentUser   = null;
let idToken       = null;
let currentUserId = '';

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` };
}

// ─────────────────────────────────────────────────────────────────
//  Auth check on page load — redirect to index if not logged in
// ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const cogUser = userPool.getCurrentUser();
  if (!cogUser) { window.location.href = 'index.html'; return; }

  cogUser.getSession((err, session) => {
    if (err || !session.isValid()) { window.location.href = 'index.html'; return; }
    currentUser   = cogUser;
    idToken       = session.getIdToken().getJwtToken();
    currentUserId = session.getIdToken().payload.sub;
    document.getElementById('user-email-display').textContent = session.getIdToken().payload.email;
    updateWeekNav();
    loadWeek();
  });
});

// ─────────────────────────────────────────────────────────────────
//  Sign out
// ─────────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  if (currentUser) currentUser.signOut();
  window.location.href = 'index.html';
});

// ─────────────────────────────────────────────────────────────────
//  Date helpers
// ─────────────────────────────────────────────────────────────────
function jakartaNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Jakarta' }));
}
function toYMD(d) { return d.toISOString().slice(0, 10); }
function mondayOf(d) {
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  return m;
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function weekLabel(monday) {
  const sunday = addDays(monday, 6);
  const opts = { month: 'short', day: 'numeric' };
  if (monday.getMonth() === sunday.getMonth()) {
    return `${monday.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })} – ${sunday.getDate()}`;
  }
  return `${monday.toLocaleDateString('en-US', opts)} – ${sunday.toLocaleDateString('en-US', opts)}`;
}

// ─────────────────────────────────────────────────────────────────
//  Completion state (localStorage)
// ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'habitCompletions';
function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveStorage(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function compKey(habitId, date) { return `${currentUserId}|${habitId}|${date}`; }
function isCompleted(habitId, date) { return !!loadStorage()[compKey(habitId, date)]; }
function setCompleted(habitId, date, val) {
  const data = loadStorage();
  if (val) data[compKey(habitId, date)] = true;
  else delete data[compKey(habitId, date)];
  saveStorage(data);
}

// ─────────────────────────────────────────────────────────────────
//  Schedule check
// ─────────────────────────────────────────────────────────────────
function isScheduledOn(habit, date) {
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const dow = date.getDay();
  const s = habit.schedule || 'daily';
  if (s === 'daily') return true;
  if (s === 'weekdays') return dow >= 1 && dow <= 5;
  if (s === 'weekends') return dow === 0 || dow === 6;
  if (s.startsWith('specific:')) return s.replace('specific:', '').split(',').includes(dayNames[dow]);
  return true;
}

// ─────────────────────────────────────────────────────────────────
//  Week state
// ─────────────────────────────────────────────────────────────────
let weekOffset = 0;
let habits = [];

function currentMonday() {
  return addDays(mondayOf(jakartaNow()), weekOffset * 7);
}
function weekDates() {
  return Array.from({ length: 7 }, (_, i) => addDays(currentMonday(), i));
}

function updateWeekNav() {
  const mon = currentMonday();
  const label = weekLabel(mon);
  const sub = weekOffset === 0 ? 'Current week'
    : weekOffset === -1 ? 'Last week'
    : weekOffset < 0 ? `${Math.abs(weekOffset)} weeks ago`
    : `${weekOffset} week${weekOffset > 1 ? 's' : ''} ahead`;
  document.getElementById('weekNavLabel').textContent = label;
  document.getElementById('weekNavSub').textContent = sub;
  document.getElementById('weekRangeLabel').textContent = label;
}

function shiftWeek(offset) {
  weekOffset = offset === 0 ? 0 : weekOffset + offset;
  updateWeekNav();
  renderGrid();
}

// ─────────────────────────────────────────────────────────────────
//  Load habits from API
// ─────────────────────────────────────────────────────────────────
async function loadWeek() {
  document.getElementById('gridSection').innerHTML = '<div class="grid-wrap"><div class="loading">Loading habits...</div></div>';
  document.getElementById('overallSection').innerHTML = '';
  try {
    const res = await fetch(`${API}/habits`, { headers: authHeaders() });
    if (res.status === 401) { window.location.href = 'index.html'; return; }
    const data = await res.json();
    habits = data.habits || [];
    renderGrid();
  } catch {
    document.getElementById('gridSection').innerHTML =
      '<div class="grid-wrap"><div class="empty-state">Failed to load habits. Check your connection.</div></div>';
  }
}

// ─────────────────────────────────────────────────────────────────
//  Render completion grid
// ─────────────────────────────────────────────────────────────────
function colorClass(pct) { return pct >= 70 ? 'green' : pct >= 40 ? 'orange' : 'red'; }

function renderGrid() {
  const dates = weekDates();
  const todayYMD = toYMD(jakartaNow());
  const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  if (!habits.length) {
    document.getElementById('overallSection').innerHTML = '';
    document.getElementById('gridSection').innerHTML =
      '<div class="grid-wrap"><div class="empty-state">No habits found.</div></div>';
    return;
  }

  let totalDone = 0, totalPossible = 0;
  const habitStats = habits.map(h => {
    let done = 0, scheduled = 0;
    dates.forEach(d => {
      if (!isScheduledOn(h, d)) return;
      scheduled++;
      totalPossible++;
      if (isCompleted(h.habitId, toYMD(d))) { done++; totalDone++; }
    });
    const pct = scheduled > 0 ? Math.round((done / scheduled) * 100) : 0;
    return { ...h, done, scheduled, pct };
  });

  const overallPct = totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0;
  const cc = colorClass(overallPct);

  document.getElementById('overallSection').innerHTML = `
    <div class="overall-card">
      <div class="overall-pct ${cc}">${overallPct}%</div>
      <div class="overall-meta">
        <strong style="font-size:15px;">Overall completion</strong>
        <p>${totalDone} of ${totalPossible} scheduled done</p>
      </div>
      <div class="overall-bar-wrap">
        <div class="bar-track">
          <div class="bar-fill ${cc}" style="width:${overallPct}%"></div>
        </div>
      </div>
    </div>
  `;

  let thead = `<tr><th class="habit-col">Habit</th>`;
  dates.forEach((d, i) => {
    const isToday = toYMD(d) === todayYMD;
    thead += `<th class="${isToday ? 'col-today' : ''}">
      <span class="day-header-label">${dayLabels[i]}</span>
      <span class="day-header-date ${isToday ? 'day-header-today' : ''}">${d.getDate()}</span>
    </th>`;
  });
  thead += '</tr>';

  let tbody = '';
  habitStats.forEach(h => {
    tbody += `<tr><td class="habit-col">
      <div class="habit-name-cell">${escHtml(h.name)}</div>
      <div class="habit-rate ${colorClass(h.pct)}">${h.scheduled > 0 ? `${h.done}/${h.scheduled} · ${h.pct}%` : 'Not scheduled'}</div>
    </td>`;
    dates.forEach(d => {
      const ymd = toYMD(d);
      const isToday = ymd === todayYMD;
      const isFuture = ymd > todayYMD;
      const scheduled = isScheduledOn(h, d);
      const done = isCompleted(h.habitId, ymd);

      let cls = 'day-dot';
      let symbol = '';
      let clickable = false;

      if (!scheduled) {
        cls += ' off-schedule'; symbol = '—';
      } else if (isFuture) {
        cls += ' future'; symbol = '·';
      } else if (done) {
        cls += ' done clickable'; symbol = '✓'; clickable = true;
      } else {
        cls += ' missed clickable'; symbol = '✗'; clickable = true;
      }
      if (isToday && scheduled) cls += ' today-dot';

      const onclick = clickable ? `onclick="toggleCompletion('${escAttr(h.habitId)}','${ymd}')"` : '';
      const title = !scheduled ? 'Not scheduled' : isFuture ? 'Future date' : done ? 'Click to undo' : 'Click to mark done';

      tbody += `<td class="day-cell ${isToday ? 'col-today' : ''}">
        <div class="${cls}" ${onclick} title="${title}">${symbol}</div>
      </td>`;
    });
    tbody += '</tr>';
  });

  document.getElementById('gridSection').innerHTML = `
    <div class="grid-wrap">
      <table class="grid-table">
        <thead>${thead}</thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────────
//  Toggle completion
// ─────────────────────────────────────────────────────────────────
async function toggleCompletion(habitId, date) {
  const wasDone = isCompleted(habitId, date);
  setCompleted(habitId, date, !wasDone);

  if (!wasDone) {
    try {
      await fetch(`${API}/complete?habitId=${encodeURIComponent(habitId)}&date=${date}`, {
        headers: authHeaders(),
      });
    } catch (_) {}
    showToast('Marked done');
  } else {
    showToast('Unmarked');
  }
  renderGrid();
}

// ─────────────────────────────────────────────────────────────────
//  Utils
// ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escAttr(s) { return String(s).replace(/'/g, "\\'"); }
</script>
</body>
</html>
